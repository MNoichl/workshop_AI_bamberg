<script>
(function waitForReveal(){
    if (!window.Reveal || !Reveal.on) return setTimeout(waitForReveal, 30);

    // Default: only auto-open a modal when the revealed fragment is the modal
    // trigger itself, or an explicit wrapper fragment opts in with
    // data-modal-auto="true". Parent bullet fragments do not auto-open child
    // modal links anymore.
    Reveal.on('fragmentshown', (e) => {
        let trigger = null;

        if (e.fragment.classList.contains('opens-modal')) {
            trigger = e.fragment;
        } else if (e.fragment.dataset && e.fragment.dataset.modalAuto === 'true') {
            trigger = e.fragment.querySelector && e.fragment.querySelector('.opens-modal');
        }

        if (!trigger) return;
        trigger.click();
    });

    // While modal is open: ArrowRight / Enter => close (don't advance)
    document.addEventListener('keydown', (ev) => {
        const deck = document.querySelector('.reveal');
        const open = deck && deck.classList.contains('multimodal-open');
        if (open && (ev.key === 'ArrowRight' || ev.key === 'Enter')) {
            ev.preventDefault();
            ev.stopPropagation();
            document.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape' }));
        }
    }, { capture: true });
})();
</script>
