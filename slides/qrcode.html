<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QR</title>
  <style>
    :root { font-family: system-ui, sans-serif; }
    html, body { width: 100%; height: 100%; margin: 0; background: transparent; }
    body { display: grid; place-items: center; }
    .wrap {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: transparent;
      padding: 0;
    }
    #qrcode {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      background: transparent;
    }
    #qrcode img,
    #qrcode canvas,
    #qrcode table {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      image-rendering: pixelated;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="qrcode" aria-label="QR code"></div>
  </div>

  <!-- Lightweight QR library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
  (function () {
    "use strict";

    const elWrap = document.getElementById("qrcode");

    const params = new URLSearchParams(window.location.search);
    const TARGET_URL =
      params.get("url") ||
      params.get("text") ||
      "https://mnoichl.github.io/workshop_AI_bamberg/";
    const correctLevel = QRCode.CorrectLevel.M; // L M Q H

    const dark = "#000000";
    const light = "transparent"; // transparent background

    function render() {
      elWrap.innerHTML = "";
      const side = Math.max(220, Math.floor(Math.min(window.innerWidth, window.innerHeight)));
      new QRCode(elWrap, {
        text: TARGET_URL,
        width: side,
        height: side,
        colorDark: dark,
        colorLight: light,
        correctLevel
      });
    }

    render();
    window.addEventListener("resize", render, { passive: true });
  })();
  </script>
</body>
</html>
